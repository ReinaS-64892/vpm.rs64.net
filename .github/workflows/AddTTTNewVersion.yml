name: add-ttt-new-version
on:
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true

jobs:
  add-ttt-new-version:
    runs-on: ubuntu-latest
    steps:
      - name: Get NewVarsion Data
        id: RereaseData
        uses: cardinalby/git-get-release-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repo: ReinaS-64892/TexTransTool
          tag: ${{ github.event.inputs.tag }}
      - name: Debug
        run: |
          pwd
          ls -alh
      - uses: actions/github-script@v6
        env:
          InputStr: ${{ steps.RereaseData.outputs.assets }}
        with:
          script: |
            const {InputStr } = process.env

            let packageDotJsonURL = null;
            let TTTZipJsonURL = null;

            for (const asset of InputStr){
              console.log(asset.name)
              if(asset.name == package.json)
              {
                packageDotJsonURL = asset.browser_download_url;
              }
              else if (asset.name.startsWith("tex-trans-tool-"))
              {
                TTTZipJsonURL = asset.browser_download_url;
              }
            }

            var https = require('https');

            var  https.get(packageDotJsonURL , (res) =>{
              let data = '';
              res.on('data', (chunk) => {data += chunk} )
              .on('end' () => {

              console.log(data);




              })
            });



